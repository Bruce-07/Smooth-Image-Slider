<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sliding Image Track</title>
  <style>
    body {
      height: 100vh;
      width: 100vw;
      margin: 0;
      background-color: black;
      overflow: hidden;
    }
    #image-track {
      display: flex;
      gap: 4vmin;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(0%, -50%);
      user-select: none;
    }
    #image-track > .image {
      width: 40vmin;
      height: 56vmin;
      object-fit: cover;
      object-position: 100% center;
      pointer-events: none;
    }
    .title{
  position:absolute;
  top:10%;
  left:50%;
  transform:translate(-50%, -50%);
  color:white;
  font-size:2rem;
  font-family:Arial, sans-serif;
}
  </style>
</head>
<body>
  <h3 class="title">Smooth Image Slider</h3>
  <div id="image-track" data-mouse-down-at="0" data-prev-percentage="0">
    <img class="image" src="1.jpg" draggable="false" />
    <img class="image" src="2.jpg" draggable="false" />
    <img class="image" src="3.jpg" draggable="false" />
    <img class="image" src="4.jpg" draggable="false" />
    <img class="image" src="5.jpg" draggable="false" />
    <img class="image" src="6.jpg" draggable="false" />
    <img class="image" src="7.jpg" draggable="false" />
    <img class="image" src="8.jpg" draggable="false" />
  </div>

  <script>
    const track = document.getElementById("image-track");

    const handleOnDown = e => track.dataset.mouseDownAt = e.clientX;
    const handleOnUp = () => {
      track.dataset.mouseDownAt = "0";
      track.dataset.prevPercentage = track.dataset.percentage;
    };
    const handleOnMove = e => {
      if (track.dataset.mouseDownAt === "0") return;
      const mouseDelta = parseFloat(track.dataset.mouseDownAt) - e.clientX,
            maxDelta = window.innerWidth / 2;
      const percentage = (mouseDelta / maxDelta) * -100;
      const nextPercentageUnconstrained = parseFloat(track.dataset.prevPercentage) + percentage;
      const nextPercentage = Math.max(Math.min(nextPercentageUnconstrained, 0), -100);

      track.dataset.percentage = nextPercentage;

      track.animate({ transform: `translate(${nextPercentage}%, -50%)` },
                    { duration: 1200, fill: "forwards" });

      for (const image of track.getElementsByClassName("image")) {
        image.animate({ objectPosition: `${100 + nextPercentage}% center` },
                      { duration: 1200, fill: "forwards" });
      }
    };

    window.onmousedown = handleOnDown;
    window.ontouchstart = e => handleOnDown(e.touches[0]);
    window.onmouseup = handleOnUp;
    window.ontouchend = e => handleOnUp(e.changedTouches[0]);
    window.onmousemove = handleOnMove;
    window.ontouchmove = e => handleOnMove(e.touches[0]);
  </script>
</body>
</html>
